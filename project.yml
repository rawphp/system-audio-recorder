name: SystemAudioToMP3
options:
  bundleIdPrefix: com.tomkaczocha
  deploymentTarget:
    macOS: "14.4"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.4"
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: NO
    PRODUCT_BUNDLE_IDENTIFIER: com.tomkaczocha.SystemAudioRecorder
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_LSUIElement: NO
    INFOPLIST_KEY_NSHumanReadableCopyright: ""
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
targets:
  SystemAudioToMP3:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: AudioEngine
        optional: true
      - path: Permissions
        optional: true
      - path: Hotkey
        optional: true
      - path: Resources
        optional: true
      - path: Vendor
        optional: true
    settings:
      base:
        PRODUCT_NAME: SystemAudioToMP3
        PRODUCT_BUNDLE_IDENTIFIER: com.tomkaczocha.SystemAudioRecorder
schemes:
  SystemAudioToMP3:
    build:
      targets:
        SystemAudioToMP3: all
    run:
      config: Debug
    archive:
      config: Release
