name: SystemAudioRecorder
options:
  bundleIdPrefix: com.tomkaczocha
  deploymentTarget:
    macOS: "14.4"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.4"
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: NO
    PRODUCT_BUNDLE_IDENTIFIER: com.tomkaczocha.SystemAudioRecorder
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_KEY_LSUIElement: NO
    INFOPLIST_KEY_NSHumanReadableCopyright: ""
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
  configs:
    Debug:
      ARCHS: "arm64"
      ONLY_ACTIVE_ARCH: YES
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"

targets:
  SystemAudioRecorder:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: AudioEngine
        optional: true
      - path: Permissions
        optional: true
      - path: Hotkey
        optional: true
      - path: Resources
        optional: true
    dependencies:
      - package: KeyboardShortcuts
      - framework: Vendor/lame.xcframework
        embed: false
    settings:
      base:
        PRODUCT_NAME: SystemAudioRecorder
        PRODUCT_BUNDLE_IDENTIFIER: com.tomkaczocha.SystemAudioRecorder
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/SystemAudioRecorder.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_STYLE: Manual
          ENABLE_HARDENED_RUNTIME: YES
          DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
          OTHER_CODE_SIGN_FLAGS: "--timestamp --options runtime"

  AudioEngineTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.4"
    sources:
      - path: Tests/AudioEngineTests
    dependencies:
      - target: SystemAudioRecorder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomkaczocha.AudioEngineTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  SystemAudioRecorder:
    build:
      targets:
        SystemAudioRecorder: all
        AudioEngineTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: AudioEngineTests
          parallelizable: false
          randomExecutionOrder: false
    archive:
      config: Release
