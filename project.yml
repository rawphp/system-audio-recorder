name: SystemAudioToMP3
options:
  bundleIdPrefix: com.tomkaczocha
  deploymentTarget:
    macOS: "14.4"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.4"
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: NO
    PRODUCT_BUNDLE_IDENTIFIER: com.tomkaczocha.SystemAudioRecorder
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_KEY_LSUIElement: NO
    INFOPLIST_KEY_NSHumanReadableCopyright: ""
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"

targets:
  SystemAudioToMP3:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: AudioEngine
        optional: true
      - path: Permissions
        optional: true
      - path: Hotkey
        optional: true
      - path: Resources
        optional: true
    dependencies:
      - package: KeyboardShortcuts
      - framework: Vendor/lame.xcframework
        embed: false
    settings:
      base:
        PRODUCT_NAME: SystemAudioToMP3
        PRODUCT_BUNDLE_IDENTIFIER: com.tomkaczocha.SystemAudioRecorder
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/SystemAudioToMP3.entitlements

  AudioEngineTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.4"
    sources:
      - path: Tests/AudioEngineTests
    dependencies:
      - target: SystemAudioToMP3
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomkaczocha.AudioEngineTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  SystemAudioToMP3:
    build:
      targets:
        SystemAudioToMP3: all
        AudioEngineTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: AudioEngineTests
          parallelizable: false
          randomExecutionOrder: false
    archive:
      config: Release
