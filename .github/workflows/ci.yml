name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build (macos-14)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ hashFiles('project.yml') }}
          restore-keys: |
            deriveddata-

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # NOTE: xcodebuild build is used here instead of xcodebuild test because
      # the Tests target (AudioEngineTests + IntegrationTests) does not exist yet.
      # Switch to `xcodebuild test` once REQ-036 (recording-session-int-tests) lands
      # and the scheme includes a test action with the Tests target.
      - name: Build
        run: |
          xcodebuild build \
            -project SystemAudioRecorder.xcodeproj \
            -scheme SystemAudioRecorder \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult
          if-no-files-found: ignore
